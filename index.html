<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Study - Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>English Study</h1>
      <p>Learn to speak English</p>
    </header>

    <!-- Set Selection Screen -->
    <div id="setSelectionScreen" class="screen active">
      <h2>Select an option:</h2>


    <!-- Create Major Sections -->
    <section id="lessonSection">
      <h3>Lessons</h3>
      <p>Read English lessons</p>
      <button id="lessnBtn" class="btn-secondary">Access Lessons</button>
    </section>

    <section id="vocabSection">
      <h3>Vocabulary</h3>
      <p>Learn and practice English words</p>
      <button id="vocabBtn" class="btn-secondary">Access Vocabulary Tools</button>
    </section>

    <section id="exercisesSection">
      <h3>Exercises</h3>
      <p>Practice phrases and sentences</p>
      <button id="exerBtn" class="btn-secondary">Access Exercises</button>
    </section>
    </div>


    <!-- Flashcard Study Screen -->
    <div id="vocabScreen" class="screen">
      <div id="setList" class="set-list"></div>

      <div class="study-header">
        <button id="backBtn" class="btn-secondary">← Back</button>
        <span id="progressText" class="progress-text"></span>
      </div>

      <div class="card-container">
        <div id="flashcard" class="flashcard">
          <div class="card-inner">
            <div class="card-front">
              <p class="card-label">English</p>
              <p id="cardEnglish" class="card-text"></p>
              <button id="playAudioBtn" class="btn-audio">🔊 Hear it</button>
            </div>
            <div class="card-back hidden">
              <p class="card-label">Spanish</p>
              <p id="cardSpanish" class="card-text"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="toggleSideBtn" class="btn-secondary" style="margin-left: 10px; padding: 8px 16px; font-size: 14px;"> Switch Default Side </button>
        <button id="revealBtn" class="btn-primary">Reveal Answer</button>
        <div id="feedbackBtns" class="feedback-btns hidden">
          <button id="difficultBtn" class="btn-feedback btn-difficult">😕 Dificil</button>
          <button id="goodBtn" class="btn-feedback btn-good">✓ Hecho</button>
          <button id="easyBtn" class="btn-feedback btn-easy">😊 Facil</button>
        </div>
      </div>

      <div class="navigation">
        <button id="prevCardBtn" class="btn-nav">← ultimo</button>
        <button id="nextCardBtn" class="btn-nav">proximo →</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
