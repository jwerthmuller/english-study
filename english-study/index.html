<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Study - Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 English Vocabulary</h1>
      <p>Learn English offline</p>
    </header>

    <!-- Set Selection Screen -->
    <div id="setSelectionScreen" class="screen active">
      <h2>Choose a topic:</h2>
      <div id="setList" class="set-list"></div>
    </div>

    <!-- Flashcard Study Screen -->
    <div id="studyScreen" class="screen">
      <div class="study-header">
        <button id="backBtn" class="btn-secondary">← Back</button>
        <span id="progressText" class="progress-text"></span>
      </div>

      <div class="card-container">
        <div id="flashcard" class="flashcard">
          <div class="card-inner">
            <div class="card-front">
              <p class="card-label">English</p>
              <p id="cardEnglish" class="card-text"></p>
              <button id="playAudioBtn" class="btn-audio">🔊 Hear it</button>
            </div>
            <div class="card-back hidden">
              <p class="card-label">Spanish</p>
              <p id="cardSpanish" class="card-text"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="revealBtn" class="btn-primary">Reveal Answer</button>
        <div id="feedbackBtns" class="feedback-btns hidden">
          <button id="difficultBtn" class="btn-feedback btn-difficult">😕 Difficult</button>
          <button id="goodBtn" class="btn-feedback btn-good">✓ Got it</button>
          <button id="easyBtn" class="btn-feedback btn-easy">😊 Easy</button>
        </div>
      </div>

      <div class="navigation">
        <button id="prevCardBtn" class="btn-nav">← Previous</button>
        <button id="nextCardBtn" class="btn-nav">Next →</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
